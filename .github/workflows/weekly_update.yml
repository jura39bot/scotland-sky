name: Weekly Whisky Price Update

on:
  schedule:
    - cron: '0 6 * * 1'  # Chaque lundi à 6h UTC
  workflow_dispatch:     # Déclenchement manuel possible

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect prices
        run: python scripts/collect_prices.py

      - name: Update GitHub Pages
        run: python scripts/generate_page.py

      - name: Commit & push
        run: |
          git config user.name "Béthanie Bot"
          git config user.email "jura39bot@gmail.com"
          git add data/prices.json index.html
          git diff --staged --quiet || git commit -m "🥃 Prix whiskies tourbés — $(date +%Y-%m-%d)"
          git push
